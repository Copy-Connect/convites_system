<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Convite - {{nome}}</title>
    <style>
      @font-face { font-family: 'ThemeFont'; src: url('{{fontUrl}}') format('woff2'); font-display: swap; }
      body {
        margin: 0; padding: 0; min-height: 100vh;
        display: grid; place-items: center;
        color: #fff; text-align: center;
        background: url('{{bgUrl}}') center/cover no-repeat fixed, #000;
        font-family: 'ThemeFont', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        background: rgba(0,0,0,.45);
        padding: 24px 28px; border-radius: 16px;
        max-width: 720px; width: calc(100% - 24px);
        box-shadow: 0 8px 32px rgba(0,0,0,.35);
      }
      h1 { margin: 0 0 8px; font-size: 2rem; }
      p  { margin: 6px 0; font-size: 1.1rem; }
      .muted { opacity: .8; font-size: .95rem; }
      audio { margin-top: 14px; width: 100%; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Convite de {{nome}} — {{idade}} anos</h1>
      <p class="muted">{{endereco}}</p>
      <p>Este link é seu: <a href="{{url_convite}}" style="color:#78d0ff">{{url_convite}}</a></p>
      {{#musicUrl}}<audio controls autoplay loop src="{{musicUrl}}"></audio>{{/musicUrl}}
    </div>
  </body>
</html>
